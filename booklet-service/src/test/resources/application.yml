spring:
  datasource:
    url: jdbc:h2:mem:booklet_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    listener:
      auto-startup: false

jwt:
  secret: holidayplanner-super-secret-key-that-is-at-least-256-bits-long

service:
  secret: holidayplanner-internal-service-secret
