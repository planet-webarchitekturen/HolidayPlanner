spring:
  application:
    name: booklet-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:booklet_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: booklet-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8087

jwt:
  secret: ${JWT_SECRET:holidayplanner-super-secret-key-that-is-at-least-256-bits-long}

service:
  secret: ${SERVICE_SECRET:holidayplanner-internal-service-secret}

services:
  organization-service:
    url: ${SERVICES_ORGANIZATION_SERVICE_URL:http://localhost:8084}
  event-service:
    url: ${SERVICES_EVENT_SERVICE_URL:http://localhost:8081}
  booking-service:
    url: ${SERVICES_BOOKING_SERVICE_URL:http://localhost:8082}

booklet:
  storage-dir: ${BOOKLET_STORAGE_DIR:${java.io.tmpdir}/holidayplanner-booklets}
