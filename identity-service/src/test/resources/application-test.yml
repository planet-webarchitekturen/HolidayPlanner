spring:
  datasource:
    url: jdbc:h2:mem:identitytest;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  kafka:
    listener:
      auto-startup: false
    bootstrap-servers: localhost:9092

jwt:
  secret: holidayplanner-super-secret-key-that-is-at-least-256-bits-long
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

services:
  booking-service:
    url: http://localhost:8082

service:
  secret: holidayplanner-internal-service-secret
